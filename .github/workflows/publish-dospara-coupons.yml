name: Update Dospara coupon data

on:
  workflow_dispatch:
  schedule:
    - cron: "7 */6 * * *"

permissions:
  contents: write

concurrency:
  group: dospara-coupon-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build public data
        run: python scripts/build_public_data.py --output-dir public

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/dospara_coupons.json public/dospara_coupons.csv public/index.html public/.nojekyll
          if git diff --cached --quiet
          then
            echo "No generated data changes"
          else
            git commit -m "Update Dospara coupon data"
            git push
          fi
